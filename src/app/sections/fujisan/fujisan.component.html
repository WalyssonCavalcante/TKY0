<section class="fujisan" #sectionEl>

  <!-- ─── Back layer: Monte Fuji (slowest) ──────── -->
  <div class="fujisan__layer fujisan__layer--back" #layerBack>
    <img
      src="mt-fuji.jpg"
      alt="Monte Fuji ao anoitecer com pagode"
      class="fujisan__img"
      loading="lazy"
    />
    <div class="fujisan__overlay"></div>
  </div>

  <div class="fujisan__layer fujisan__layer--mid" #layerMid>
    <div class="fujisan__text-block">
      <span class="fujisan__kanji" aria-hidden="true">富士山</span>
      <h2 class="fujisan__title">Monte Fuji</h2>
      <p class="fujisan__sub">3 776 m — A montanha sagrada que nunca se move,<br />mas vive em tudo que a cerca.</p>
    </div>
  </div>

  <div class="fujisan__layer fujisan__layer--front" #layerFront aria-hidden="true">
    <span class="fujisan__petal fujisan__petal--1"></span>
    <span class="fujisan__petal fujisan__petal--2"></span>
    <span class="fujisan__petal fujisan__petal--3"></span>
    <span class="fujisan__petal fujisan__petal--4"></span>
    <span class="fujisan__petal fujisan__petal--5"></span>
    <span class="fujisan__petal fujisan__petal--6"></span>
    <span class="fujisan__petal fujisan__petal--7"></span>
    <span class="fujisan__petal fujisan__petal--8"></span>
    <span class="fujisan__petal fujisan__petal--9"></span>
    <span class="fujisan__petal fujisan__petal--10"></span>
    <span class="fujisan__petal fujisan__petal--11"></span>
    <span class="fujisan__petal fujisan__petal--12"></span>
  </div>

  <div class="fujisan__coords" aria-hidden="true">
    35.3606° N · 138.7274° E
  </div>

  <div class="fujisan__badge" #badgeEl aria-hidden="true">
    <span class="fujisan__badge-num">3 776</span>
    <span class="fujisan__badge-unit">m</span>
  </div>

</section>
