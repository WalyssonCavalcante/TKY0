<app-noise-overlay />

@if (!isLoaded()) {
  <app-preloader (loaded)="onLoaded()" />
}

<a class="skip-link" href="#main-content">Pular para o conteúdo</a>
<app-scroll-progress />
<app-nav />

<main id="main-content">
  <app-hero />

  @defer (on viewport; prefetch on idle) {
    <app-manifesto />
  } @placeholder {
    <div style="min-height: 100vh;"></div>
  }

  @defer (on viewport; prefetch on idle) {
    <app-stories-grid />
  } @placeholder {
    <div style="min-height: 80vh;"></div>
  }

  @defer (on viewport; prefetch on idle) {
    <app-districts />
  } @placeholder {
    <div style="min-height: 80vh;"></div>
  }

  @defer (on viewport; prefetch on idle) {
    <app-stats />
  } @placeholder {
    <div style="min-height: 40vh;"></div>
  }

  <app-footer />
</main>
